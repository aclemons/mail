name: Setup OpenTofu
description: Setup opentofu.
runs:
  using: composite
  steps:
    - name: Validate version from tf/.opentofu-version
      id: load
      shell: bash
      run: |
        set -e

        tofu_version="$(head -n1 tf/.opentofu-version | tr -d '\r')"
        if [[ ! "$tofu_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
          printf "Invalid TOFU_VERSION in tf/.opentofu-version: '%s'\n" "$tofu_version" >&2
          exit 1
        fi

        printf "tofu_version=%s\n" "$tofu_version" >> "$GITHUB_OUTPUT"

    - name: Setup opentofu
      uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
      with:
        tofu_version: ${{ steps.load.outputs.tofu_version }}
        tofu_wrapper: false
